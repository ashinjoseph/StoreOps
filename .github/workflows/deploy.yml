name: Deploy to Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install clasp
        run: npm install -g @google/clasp
      
      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
      
      - name: Push to Apps Script
        run: clasp push --force
      
      - name: Redeploy existing Web App
        run: |
          # 1. Create a fresh version snapshot of the code we just pushed
          VERSION_NUM=$(clasp version "Auto-version $(git rev-parse --short HEAD)" | grep -oE '[0-9]+' | tail -n 1)
          
          # 2. Update your permanent deployment ID to point to this new version
          clasp redeploy \
            --id AKfycbyncTiTAQYlOUsVQomapFbpjkh1WiTOA9Ag7JpkWeN0Lhx6Z9bODf1isCbhoT-0pl9D \
            --version "$VERSION_NUM" \
            --description "Auto-deploy $(git rev-parse --short HEAD)"