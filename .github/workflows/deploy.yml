name: Deploy to Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install clasp
        run: npm install -g @google/clasp
      
      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
      
      - name: Push to Apps Script
        run: clasp push --force
      
      - name: Deploy new Apps Script version
        run: |
          clasp deploy \
            --deploymentId AKfycbyncTiTAQYlOUsVQomapFbpjkh1WiTOA9Ag7JpkWeN0Lhx6Z9bODf1isCbhoT-0pl9D \
            --description "Auto-deploy $(git rev-parse --short HEAD)"      
      