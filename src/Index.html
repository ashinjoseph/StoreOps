  // Render a small "← More" back link at the top of any drawer view.
  // Returns the HTML string; views call this and prepend it to their content.
  function moreBack() {
    return '<button class="more-back" onclick="switchTab(\'more\')">← More</button>';
  }

  // ============================================================
  //  ░░  TAB: SHOPPING LIST  ░░
  // ============================================================
  //  Shared "to order" list. Anyone can add (catalog pick or new item);
  //  manager/payroll_admin/admin can Generate & send (formats text,
  //  clears pending, sends WhatsApp). Visible to everyone.
  // ============================================================
  async function loadShoppingTab(force) {
    const view = $('view-shopping');
    if (force || !cacheFresh('rpcGetShoppingList', [state.token], TTL_LIVE)) {
      view.innerHTML = '<div class="loading"><div class="spinner"></div>Loading list…</div>';
    }
    try {
      const list = await cachedCall('rpcGetShoppingList', [state.token], TTL_LIVE, { force });
      renderShoppingTab(list);
    } catch (e) {
      handleRpcError(e, view);
    }
  }

  function renderShoppingTab(list) {
    const view = $('view-shopping');
    list = list || [];
    const privileged = ['admin', 'manager', 'payroll_admin'].indexOf(state.me.role) >= 0;
    const toBuy = list.filter(e => !e.bought).length;
    const doneCount = list.length - toBuy;

    let html = moreBack();

    // Action buttons: Add (all), then Generate + Clear (manager+).
    html += '<button class="btn-primary" id="addItemBtn" style="width:100%; padding:10px; font-size:13px; margin-bottom:8px">+ Add item</button>';
    if (privileged) {
      html += '<div style="display:flex; gap:8px; margin-bottom:12px">' +
        '<button class="btn-primary" id="genListBtn" style="flex:1; padding:10px; font-size:13px; background:#15803d"' +
          (toBuy === 0 ? ' disabled' : '') + '>Generate &amp; send</button>' +
        '<button class="btn-primary" id="clearListBtn" style="flex:1; padding:10px; font-size:13px; background:#b91c1c"' +
          (list.length === 0 ? ' disabled' : '') + '>Clear list</button>' +
      '</div>';
    }

    // Generated output (persists across reloads via state.lastGenerated)
    html += renderGeneratedOutputHTML_(state.lastGenerated);

    html += '<div class="mypay-section-title">To buy (' + toBuy + ')' +
      (doneCount > 0 ? ' · ' + doneCount + ' done' : '') + '</div>';
    if (list.length === 0) {
      html += '<div class="empty" style="padding:20px"><div class="empty-icon">🛒</div>Nothing on the list yet. Tap "+ Add item".</div>';
    } else {
      const cats = ORDER_CATEGORIES.slice();
      list.forEach(e => { const c = e.category || 'Other'; if (cats.indexOf(c) === -1) cats.push(c); });
      cats.forEach(cat => {
        const inCat = list.filter(e => (e.category || 'Other') === cat);
        if (inCat.length === 0) return;
        html += '<div class="recent-title" style="margin:10px 0 6px">' + esc(cat) + '</div>';
        inCat.forEach(e => {
          const canRemove = e.addedBy === state.me.staffId || privileged;
          html += '<div class="history-item shop-row">' +
            '<input type="checkbox" class="shop-check" data-bought="' + esc(e.entryId) + '"' + (e.bought ? ' checked' : '') + '>' +
            '<div class="shop-item">' +
              '<div class="history-name' + (e.bought ? ' shop-done' : '') + '">' + esc(e.itemName) +
                ' <span style="color:#6a6e79; font-weight:600">× ' + e.quantity + (e.unit ? ' ' + esc(e.unit) : '') + '</span></div>' +
              '<div class="history-meta">' + (e.note ? esc(e.note) + ' · ' : '') +
                'by ' + esc(e.addedByName || e.addedBy) + '</div>' +
            '</div>' +
            (canRemove ? '<button class="shop-edit" data-edit="' + esc(e.entryId) + '" title="Edit">✎</button>' : '') +
            (canRemove ? '<button class="shop-remove" data-remove="' + esc(e.entryId) + '" title="Remove">✕</button>' : '') +
          '</div>';
        });
      });
    }

    view.innerHTML = html;

    $('addItemBtn').onclick = () => { haptic(); openAddShoppingItem(); };
    const gen = $('genListBtn');
    if (gen) gen.onclick = () => { haptic(); generateShoppingList(); };
    const clr = $('clearListBtn');
    if (clr) clr.onclick = () => { haptic(); clearShoppingList(); };
    const copyBtn = $('copyGenBtn');
    if (copyBtn) copyBtn.onclick = copyGeneratedText_;
    const dismiss = view.querySelector('[data-dismiss-gen]');
    if (dismiss) dismiss.onclick = () => { state.lastGenerated = null; loadShoppingTab(); };

    view.querySelectorAll('[data-bought]').forEach(cb => {
      cb.onchange = async () => {
        haptic();
        cb.disabled = true;
        try {
          await call('rpcSetShoppingItemBought', state.token, cb.dataset.bought, cb.checked);
          loadShoppingTab();
        } catch (e) { toast(e.message, 'error'); cb.checked = !cb.checked; cb.disabled = false; }
      };
    });
    view.querySelectorAll('[data-remove]').forEach(b => {
      b.onclick = async () => {
        if (!confirm('Remove this item from the list?')) return;
        haptic();
        b.disabled = true;
        try {
          await call('rpcRemoveShoppingListEntry', state.token, b.dataset.remove);
          toast('Removed', 'warning');
          loadShoppingTab();
        } catch (e) { toast(e.message, 'error'); b.disabled = false; }
      };
    });
    view.querySelectorAll('[data-edit]').forEach(b => {
      b.onclick = () => { haptic(); openEditShoppingItem(list.find(x => x.entryId === b.dataset.edit)); };
    });
  }

  async function clearShoppingList() {
    if (!confirm('Clear the entire list and start fresh? This removes all items (bought and to-buy).')) return;
    const btn = $('clearListBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Clearing…'; }
    try {
      const res = await call('rpcClearShoppingList', state.token);
      state.lastGenerated = null;
      toast('Cleared ' + (res.cleared || 0) + ' item(s)', 'warning');
      loadShoppingTab();
    } catch (e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Clear list'; }
    }
  }

  function renderGeneratedOutputHTML_(result) {
    if (!result || !result.text) return '';
    const wa = result.whatsapp || {};
    const waLine = wa.sent
      ? '<div style="color:#15803d; font-size:12px; font-weight:600; margin-top:6px">✓ Sent via WhatsApp</div>'
      : '<div style="color:#92611a; font-size:12px; font-weight:600; margin-top:6px">Not sent via WhatsApp (' +
        esc(wa.reason || 'unknown') + ') — copy &amp; paste below</div>';
    return '<div class="gen-output">' +
      '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">' +
        '<strong style="font-size:13px">Generated list (' + result.itemCount + ' items)</strong>' +
        '<button class="more-back" data-dismiss-gen="1" style="margin:0">Dismiss</button>' +
      '</div>' +
      '<textarea id="genText" readonly class="gen-text">' + esc(result.text) + '</textarea>' +
      '<button class="btn-primary" id="copyGenBtn" style="width:100%; padding:9px; font-size:13px; margin-top:8px">📋 Copy</button>' +
      waLine +
    '</div>';
  }

  async function copyGeneratedText_() {
    const ta = $('genText');
    if (!ta) return;
    try {
      await navigator.clipboard.writeText(ta.value);
      toast('Copied', 'success');
    } catch (e) {
      ta.select();
      try { document.execCommand('copy'); toast('Copied', 'success'); }
      catch (e2) { toast('Press and hold to copy', 'warning'); }
    }
  }

  async function generateShoppingList() {
    if (!confirm('Generate the to-buy list and (if configured) send it via WhatsApp?' +
                 ' The list stays as-is — items only leave when checked off or cleared.')) return;
    const btn = $('genListBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
    try {
      const result = await call('rpcGenerateShoppingList', state.token);
      if (result.empty) {
        toast('Nothing to order', 'warning');
        if (btn) { btn.disabled = false; btn.textContent = 'Generate & send'; }
        return;
      }
      state.lastGenerated = result;
      toast(result.whatsapp && result.whatsapp.sent ? '✓ Generated & sent' : '✓ Generated', 'success');
      loadShoppingTab();
    } catch (e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Generate & send'; }
    }
  }

  async function openAddShoppingItem() {
    openSheet({
      title: 'Add item', subtitle: 'Pick from the catalog or add a new one',
      bodyHTML: '<div class="loading"><div class="spinner"></div>Loading catalog…</div>',
      actionsHTML: '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>',
    });
    let catalog = [];
    try { catalog = await cachedCall('rpcGetOrderCatalog', [state.token], TTL_REF); } catch (e) {}

    // Category list = starter set ∪ categories already in the catalog,
    // plus a "+ New category…" option so users can add their own (e.g. Beer).
    const cats = ORDER_CATEGORIES.slice();
    catalog.forEach(i => { if (i.category && cats.indexOf(i.category) === -1) cats.push(i.category); });
    const catOptions = cats.map(c => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join('') +
      '<option value="__newcat__">+ New category…</option>';
    const bodyHTML =
      '<div class="sheet-field"><label>Category</label>' +
        '<select id="siCategory">' + catOptions + '</select></div>' +
      '<div class="sheet-field" id="siNewCatWrap" style="display:none"><label>New category name</label>' +
        '<input type="text" id="siNewCat" placeholder="e.g. Beer"></div>' +
      '<div class="sheet-field"><label>Item</label>' +
        '<select id="siItem"></select></div>' +
      '<div id="siNewWrap" style="display:none">' +
        '<div class="sheet-field"><label>New item name</label><input type="text" id="siNewName" placeholder="e.g. 2% Milk 1L"></div>' +
        '<div class="sheet-field"><label>Unit (optional)</label><input type="text" id="siNewUnit" placeholder="each / carton / case"></div>' +
        '<div class="sheet-field"><label>Unit price $ (optional)</label><input type="number" step="0.01" id="siNewPrice" inputmode="decimal" placeholder="0.00"></div>' +
        '<div class="sheet-field"><label>Par level — target stock (optional)</label><input type="number" step="1" id="siNewPar" inputmode="numeric" placeholder="e.g. 12"></div>' +
      '</div>' +
      '<div class="sheet-field"><label>Quantity to order</label><input type="number" step="0.01" id="siQty" inputmode="decimal" value="1"></div>' +
      '<div class="sheet-field"><label>Note (optional)</label><input type="text" id="siNote" placeholder="e.g. urgent, the big bags"></div>';

    const actionsHTML =
      '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>' +
      '<button class="sheet-submit" id="siAddBtn">Add to list</button>';

    openSheet({ title: 'Add item', subtitle: 'Pick from the catalog or add a new one', bodyHTML, actionsHTML });

    function refreshItems() {
      const cat = $('siCategory').value;
      const items = catalog.filter(i => i.category === cat);
      $('siItem').innerHTML = '<option value="__new__">+ Add a new item…</option>' +
        items.map(i => '<option value="' + esc(i.itemId) + '">' + esc(i.name) +
          (i.unitPrice > 0 ? ' — ' + money(i.unitPrice) : '') + '</option>').join('');
      onItemChange();
    }
    function onItemChange() {
      const isNew = $('siItem').value === '__new__';
      $('siNewWrap').style.display = isNew ? 'block' : 'none';
      if (!isNew) {
        const item = catalog.find(i => i.itemId === $('siItem').value);
        if (item && item.parLevel > 0) $('siQty').value = item.parLevel;
      }
    }
    function onCatChange() {
      // For a brand-new category there are no existing items, so the item
      // dropdown naturally collapses to "+ Add a new item…" (new-item mode).
      $('siNewCatWrap').style.display = $('siCategory').value === '__newcat__' ? 'block' : 'none';
      refreshItems();
    }
    $('siCategory').onchange = onCatChange;
    $('siItem').onchange = onItemChange;
    refreshItems();

    $('siAddBtn').onclick = async () => {
      let category = $('siCategory').value;
      if (category === '__newcat__') {
        category = $('siNewCat').value.trim();
        if (!category) return toast('Enter the new category name', 'error');
      }
      const itemSel = $('siItem').value;
      const isNew = itemSel === '__new__';
      const qty = parseFloat($('siQty').value);
      const note = $('siNote').value;
      if (!Number.isFinite(qty) || qty <= 0) return toast('Enter a valid quantity', 'error');

      const payload = { category, quantity: qty, note };
      if (isNew) {
        const name = $('siNewName').value.trim();
        if (!name) return toast('Enter the new item name', 'error');
        payload.newItem = true;
        payload.itemName = name;
        payload.unit = $('siNewUnit').value.trim();
        payload.unitPrice = parseFloat($('siNewPrice').value) || 0;
        payload.parLevel = parseFloat($('siNewPar').value) || 0;
      } else {
        const item = catalog.find(i => i.itemId === itemSel);
        if (!item) return toast('Pick an item', 'error');
        payload.itemId = item.itemId;
        payload.itemName = item.name;
        payload.unit = item.unit;
      }

      haptic();
      const btn = $('siAddBtn'); btn.disabled = true; btn.textContent = 'Adding…';
      try {
        await call('rpcAddToShoppingList', state.token, payload);
        closeSheet();
        toast('✓ Added', 'success');
        loadShoppingTab();
      } catch (e) { toast(e.message, 'error'); btn.disabled = false; btn.textContent = 'Add to list'; }
    };
  }

  // Edit an existing item's name / quantity / note (modal sheet). Values are
  // set via JS after render to avoid HTML-attribute escaping issues.
  function openEditShoppingItem(entry) {
    if (!entry) return;
    const bodyHTML =
      '<div class="sheet-field"><label>Item name</label><input type="text" id="seName"></div>' +
      '<div class="sheet-field"><label>Quantity</label><input type="number" step="0.01" id="seQty" inputmode="decimal"></div>' +
      '<div class="sheet-field"><label>Note (optional)</label><input type="text" id="seNote"></div>';
    openSheet({
      title: 'Edit item', subtitle: entry.itemName,
      bodyHTML,
      actionsHTML:
        '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>' +
        '<button class="sheet-submit" id="seSaveBtn">Save</button>',
    });
    $('seName').value = entry.itemName;
    $('seQty').value = entry.quantity;
    $('seNote').value = entry.note || '';

    $('seSaveBtn').onclick = async () => {
      const itemName = $('seName').value.trim();
      const qty = parseFloat($('seQty').value);
      const note = $('seNote').value;
      if (!itemName) return toast('Enter the item name', 'error');
      if (!Number.isFinite(qty) || qty <= 0) return toast('Enter a valid quantity', 'error');
      haptic();
      const btn = $('seSaveBtn'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await call('rpcEditShoppingListEntry', state.token, entry.entryId, { itemName, quantity: qty, note });
        closeSheet();
        toast('✓ Saved', 'success');
        loadShoppingTab();
      } catch (e) { toast(e.message, 'error'); btn.disabled = false; btn.textContent = 'Save'; }
    };
  }

  // ============================================================
  //  ░░  TAB: SUPPLIERS (reference)  ░░
  // ============================================================
  async function loadSuppliersTab(force) {
    const view = $('view-suppliers');
    if (force || !cacheFresh('rpcGetSuppliers', [state.token], TTL_REF)) {
      view.innerHTML = '<div class="loading"><div class="spinner"></div>Loading suppliers…</div>';
    }
    try {
      const suppliers = await cachedCall('rpcGetSuppliers', [state.token], TTL_REF, { force });
      renderSuppliersTab(suppliers);
    } catch (e) {
      handleRpcError(e, view);
    }
  }

  function renderSuppliersTab(suppliers) {
    const view = $('view-suppliers');
    suppliers = suppliers || [];
    let html = moreBack();
    if (suppliers.length === 0) {
      html += '<div class="empty" style="padding:20px"><div class="empty-icon">🚚</div>No suppliers listed.</div>';
      view.innerHTML = html;
      return;
    }
    const cats = ORDER_CATEGORIES.slice();
    suppliers.forEach(s => { const c = s.category || 'Other'; if (cats.indexOf(c) === -1) cats.push(c); });
    cats.forEach(cat => {
      const inCat = suppliers.filter(s => (s.category || 'Other') === cat);
      if (inCat.length === 0) return;
      html += '<div class="mypay-section-title">' + esc(cat) + '</div>';
      inCat.forEach(s => {
        html += '<div class="payroll-card">' +
          '<div class="payroll-name">' + esc(s.name) + '</div>' +
          (s.products ? '<div style="font-size:12px; color:#4a4e59; margin-top:4px; line-height:1.5">' + esc(s.products) + '</div>' : '') +
          (s.contact ? '<div style="font-size:12px; color:#1a4ca1; margin-top:4px">' + esc(s.contact) + '</div>' : '') +
          (s.notes ? '<div style="font-size:11px; color:#92611a; margin-top:4px">' + esc(s.notes) + '</div>' : '') +
        '</div>';

  // ============================================================
  //  ░░  TAB: PAYROLL  ░░
  // ============================================================
  async function loadPayrollTab(force) {
    const view = $('view-payroll');
    if (force || !cacheFresh('rpcGetPayrollOverview', [state.token], TTL_SEMI)) {
      view.innerHTML = '<div class="loading"><div class="spinner"></div>Loading payroll…</div>';
    }
    try {
      const overview = await cachedCall('rpcGetPayrollOverview', [state.token], TTL_SEMI, { force });
      renderPayrollTab(overview);
    } catch (e) {
      handleRpcError(e, view);
    }

  function renderPayrollTab(overview) {
    const view = $('view-payroll');
    overview = overview || [];
    const totalOwed = overview.reduce((s, p) => s + (p.totalOwed || 0), 0);
    const totalShifts = overview.reduce((s, p) => s + (p.unpaidShiftCount || 0), 0);
    const totalStaff = overview.filter(p => p.totalOwed > 0.005).length;

    let html = moreBack() + '<div class="payroll-totals">' +
      '<div class="payroll-totals-label">TOTAL OWED</div>' +
      '<div class="payroll-totals-amount">' + money(totalOwed) + '</div>' +
      '<div class="payroll-totals-meta">' + totalShifts + ' unpaid shifts · ' + totalStaff + ' of ' + overview.length + ' staff</div>' +
    '</div>';

    // Per-staff cards
    html += '<div style="margin-top:14px"></div>';
    overview.forEach(p => {
      const hasOwed = p.totalOwed > 0.005;
      html += '<div class="payroll-card">' +
        '<div class="payroll-card-head">' +
          '<div>' +
            '<div class="payroll-name">' + esc(p.staffName) + '</div>' +
            '<div class="payroll-rate">' + money(p.hourlyRate) + '/hr</div>' +
          '</div>' +
          '<div class="payroll-owed ' + (hasOwed ? '' : 'zero') + '">' + money(p.totalOwed) + '</div>' +
        '</div>' +
        '<div class="payroll-body">' +
          '<div class="payroll-body-row"><span class="payroll-body-row-label">Unpaid shifts</span>' +
            '<span class="payroll-body-row-value">' + p.unpaidShiftCount + ' (' + money(p.shiftsOwed) + ')</span></div>' +
          '<div class="payroll-body-row"><span class="payroll-body-row-label">Pending bonuses</span>' +
            '<span class="payroll-body-row-value">' + p.pendingBonusCount + ' (' + money(p.bonusesOwed) + ')</span></div>' +
        '</div>' +
        '<div class="payroll-actions">' +
          (p.shiftsOwed > 0.005
            ? '<button class="payroll-btn payroll-btn-primary" data-pay-shifts="' + esc(p.staffId) + '">Pay Shifts</button>'
            : '') +
          (p.bonusesOwed > 0.005
            ? '<button class="payroll-btn payroll-btn-secondary" data-pay-bonus-list="' + esc(p.staffId) + '">Pay Bonus</button>'
            : '') +
          (!hasOwed
            ? '<button class="payroll-btn payroll-btn-primary" disabled>All settled</button>'
            : '') +
        '</div>' +
      '</div>';
    });

    view.innerHTML = html;

    // Lookup so modals can read the staff name without re-fetching the overview.
    const byId = {};
    overview.forEach(p => { byId[p.staffId] = p; });

    view.querySelectorAll('[data-pay-shifts]').forEach(b => {
      b.onclick = () => { haptic(); openPayShiftsForm(b.dataset.payShifts, byId[b.dataset.payShifts]); };
    });
    view.querySelectorAll('[data-pay-bonus-list]').forEach(b => {
      b.onclick = () => { haptic(); openPayBonusList(b.dataset.payBonusList, byId[b.dataset.payBonusList]); };
    });
  }

  // ── Pay shifts modal ────────────────────────────────────
  async function openPayShiftsForm(staffId, staffRow) {
    openSheet({
      title: 'Loading…', subtitle: '',
      bodyHTML: '<div class="loading"><div class="spinner"></div>Loading owed details…</div>',
      actionsHTML: '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>',
    });
    try {
      // staffRow comes from the payroll overview already on screen — no need
      // to re-fetch the whole overview just to get the name (avoids an N+1).
      const owed = await cachedCall('rpcGetOwedSummary', [state.token, staffId], TTL_SEMI);
      const staff = staffRow ||
        (await cachedCall('rpcGetPayrollOverview', [state.token], TTL_SEMI)).find(s => s.staffId === staffId);
      renderPayShiftsForm(owed, staff);
    } catch (e) { toast(e.message, 'error'); closeSheet(); }
  }

  function renderPayShiftsForm(owed, staff) {
    if (!owed || !staff) {
      toast('Could not load payment details', 'error');
      closeSheet();
      return;
    }
    const unpaidShifts = owed.unpaidShifts || [];
    const shiftsOwed = owed.shiftsOwed || 0;
    if (unpaidShifts.length === 0 || shiftsOwed <= 0.005) {
      $('sheetBody').innerHTML = '<div class="empty"><div class="empty-icon">✓</div>No unpaid shifts for ' + esc(staff.staffName) + '</div>';
      $('sheetActions').innerHTML = '<button class="sheet-cancel" onclick="closeSheet()">Close</button>';
      $('sheetTitle').textContent = staff.staffName;
      return;
    }
    const shiftLines = unpaidShifts.map(s =>
      '<div class="payroll-body-row" style="font-size:12px">' +
        '<span class="payroll-body-row-label">' + esc(s.dateStr) + ' · ' + (s.hoursWorked || 0).toFixed(2) + 'h × ' + money(s.rate) + '</span>' +
        '<span class="payroll-body-row-value">' + money(s.remaining) + (s.paid > 0.005 ? ' <small style="color:#6a6e79">(of ' + money(s.value) + ')</small>' : '') + '</span>' +
      '</div>'
    ).join('');

    const bodyHTML =
      '<div style="margin-bottom:14px">' +
        '<div style="font-size:11px;font-weight:700;color:#6a6e79;letter-spacing:0.7px;margin-bottom:6px">UNPAID SHIFTS · OLDEST FIRST</div>' +
        shiftLines +
        '<div class="payroll-body-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #e2e4ea;font-size:13px"><strong>Total owed</strong><strong>' + money(shiftsOwed) + '</strong></div>' +
      '</div>' +
      '<div class="sheet-field">' +
        '<label>Amount to pay ($)</label>' +
        '<input type="number" step="0.01" id="payAmount" inputmode="decimal" value="' + shiftsOwed.toFixed(2) + '">' +
      '</div>' +
      '<div class="progress-row" id="payProgress">' +
        '<div class="progress-label"><span>This payment</span><span id="progressLabel">' + money(shiftsOwed) + ' / ' + money(shiftsOwed) + '</span></div>' +
        '<div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:100%"></div></div>' +
      '</div>' +
      '<div class="sheet-field">' +
        '<label>Method</label>' +
        '<select id="payMethod"><option value="cash">Cash</option><option value="bank">Bank</option><option value="etransfer">e-Transfer</option><option value="other">Other</option></select>' +
      '</div>' +
      '<div class="sheet-field">' +
        '<label>Notes (optional)</label>' +
        '<input type="text" id="payNotes" placeholder="e.g. April 1-7 payroll">' +
      '</div>';

    const actionsHTML =
      '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>' +
      '<button class="sheet-submit" id="payFullBtn" style="background:#15803d">Pay Full</button>' +
      '<button class="sheet-submit" id="paySubmitBtn">Pay</button>';

    openSheet({
      title: 'Pay ' + staff.staffName,
      subtitle: money(shiftsOwed) + ' owed across ' + unpaidShifts.length + ' shift(s)',
      bodyHTML, actionsHTML,
    });

    function updateProgress() {
      const amount = parseFloat($('payAmount').value) || 0;
      const total = shiftsOwed;
      const pct = total > 0 ? Math.min(100, Math.max(0, (amount / total) * 100)) : 0;
      $('progressFill').style.width = pct.toFixed(1) + '%';
      $('progressLabel').textContent = money(amount) + ' / ' + money(total);
    }
    $('payAmount').addEventListener('input', updateProgress);

    $('payFullBtn').onclick = () => {
      $('payAmount').value = shiftsOwed.toFixed(2);
      updateProgress();
      $('paySubmitBtn').click();
    };

    $('paySubmitBtn').onclick = async () => {
      const amount = parseFloat($('payAmount').value);
      if (isNaN(amount) || amount <= 0) return toast('Enter a positive amount', 'error');
      if (!confirm('Pay ' + money(amount) + ' to ' + staff.staffName + '?')) return;
      $('paySubmitBtn').disabled = true;
      $('paySubmitBtn').textContent = 'Paying…';
      try {
        const result = await call('rpcPayShifts', state.token, {
          staffId: staff.staffId,
          amount,
          method: $('payMethod').value,
          notes: $('payNotes').value.trim(),
        });
        closeSheet();
        const summary = result.summary || {};
        toast('✓ Paid ' + money(amount) + ' · ' + summary.fullyPaidCount + ' shifts settled' +
              (summary.partialCount ? ' (1 partial)' : ''), 'success');
        loadPayrollTab();
      } catch (e) {
        toast(e.message, 'error');
        $('paySubmitBtn').disabled = false;
        $('paySubmitBtn').textContent = 'Pay';
      }
    };
  }

  // ============================================================
  //  ░░  TAB: COMMISSIONS  ░░
  // ============================================================
  //  Drives the commission lifecycle:
  //    1. Run the engine for the previous week (admin / payroll_admin)
  //    2. Review past runs (admin / manager / payroll_admin)
  //    3. Approve / Cancel proposed commissions (admin / payroll_admin)
  //  After approval, the bonus becomes payable in the Payroll view.
  // ============================================================
  async function loadCommissionsTab(force) {
    const view = $('view-commissions');
    const canSeeProposed = state.me.role === 'admin' || state.me.role === 'payroll_admin';
    const fresh = cacheFresh('rpcGetCommissionRuns', [state.token, 12], TTL_SEMI) &&
      (!canSeeProposed || cacheFresh('rpcGetProposedBonuses', [state.token], TTL_SEMI));
    if (force || !fresh) {
      view.innerHTML = '<div class="loading"><div class="spinner"></div>Loading commissions…</div>';
    }
    try {
      const [runs, proposed] = await Promise.all([
        cachedCall('rpcGetCommissionRuns', [state.token, 12], TTL_SEMI, { force }),
        canSeeProposed
          ? cachedCall('rpcGetProposedBonuses', [state.token], TTL_SEMI, { force }).catch(() => [])
          : Promise.resolve([]),
      ]);
      renderCommissionsTab(runs, proposed);
    } catch (e) {
      handleRpcError(e, view);
    }
  }

  function renderCommissionsTab(runs, proposed) {
    const view = $('view-commissions');
    runs = runs || [];
    proposed = proposed || [];
    const canRun = state.me.role === 'admin' || state.me.role === 'payroll_admin';

    let html = moreBack();

    // Run-engine card
    if (canRun) {
      html += '<div class="payroll-totals" style="text-align:left">' +
        '<div class="payroll-totals-label">RUN COMMISSION ENGINE</div>' +
        '<div style="font-size:12px;color:#4a4e59;margin:4px 0 10px;line-height:1.5">' +
          'Computes commissions for the previous full week (Mon–Sun) using all active rules. ' +
          'Idempotent: if already run this week, nothing happens unless forced.' +
        '</div>' +
        '<button class="btn-primary" id="runEngineBtn" style="padding:10px 14px;font-size:13px">▶ Run for last week</button>' +
        ' <button class="btn-primary" id="runEngineForceBtn" style="padding:10px 14px;font-size:13px;background:#92611a">⟳ Force re-run</button>' +
      '</div>';
    }

    // Proposed commissions
    if (canRun) {
      html += '<div class="recent-title" style="margin-top:14px;margin-bottom:8px">⏳ PROPOSED COMMISSIONS — NEEDS APPROVAL (' + proposed.length + ')</div>';
      if (proposed.length === 0) {
        html += '<div class="empty" style="padding:20px"><div class="empty-icon">✓</div>No proposed commissions awaiting approval.</div>';
      } else {
        proposed.forEach(p => {
          html += '<div class="proposed-card">' +
            '<div class="proposed-card-head">' +
              '<div class="proposed-name">' + esc(p.staffName) + '</div>' +
              '<div class="proposed-amount">' + money(p.amount) + '</div>' +
            '</div>' +
            '<div class="proposed-meta">' + esc(p.reason || '') + '</div>' +
            '<div class="proposed-actions">' +
              '<button class="proposed-btn proposed-btn-cancel" data-cancel="' + esc(p.bonusId) + '">Cancel</button>' +
              '<button class="proposed-btn proposed-btn-approve" data-approve="' + esc(p.bonusId) + '">Approve</button>' +
            '</div>' +
          '</div>';
        });
      }
    }

    // Past runs
    html += '<div class="recent-title" style="margin-top:14px;margin-bottom:8px">📜 PAST RUNS (' + runs.length + ')</div>';
    if (runs.length === 0) {
      html += '<div class="empty" style="padding:20px"><div class="empty-icon">🗒️</div>No commission runs yet.</div>';
    } else {
      runs.forEach(r => {
        const ws = r.weekStart ? fmtDate(r.weekStart) : '—';
        const we = r.weekEnd ? fmtDate(r.weekEnd) : '—';
        const computedAt = r.computedAt ? fmtDate(r.computedAt) : '—';
        html += '<div class="history-item">' +
          '<div class="history-head">' +
            '<div style="flex:1;min-width:0">' +
              '<div class="history-name">' + esc(ws) + ' → ' + esc(we) + '</div>' +
              '<div class="history-meta">' +
                r.bonusesCreated + ' bonus' + (r.bonusesCreated === 1 ? '' : 'es') + ' · ' +
                r.staffCount + ' staff · computed ' + esc(computedAt) +
                (r.computedByName ? ' by ' + esc(r.computedByName) : '') +
              '</div>' +
              (r.notes ? '<div class="history-meta" style="font-style:italic">' + esc(r.notes) + '</div>' : '') +
            '</div>' +
            '<div class="history-amount">' + money(r.totalCommissionAmount) + '</div>' +
          '</div>' +
        '</div>';
      });
    }

    view.innerHTML = html;

    if (canRun) {
      const runBtn = $('runEngineBtn');
      if (runBtn) runBtn.onclick = () => triggerCommissionRun(false);
      const forceBtn = $('runEngineForceBtn');
      if (forceBtn) forceBtn.onclick = () => {
        if (!confirm('Force re-run? This will compute again for the same week even if a run already exists.')) return;
        triggerCommissionRun(true);
      };
      view.querySelectorAll('[data-approve]').forEach(b => {
        b.onclick = async () => {
          haptic();
          b.disabled = true;
          try {
            await call('rpcApproveBonus', state.token, b.dataset.approve);
            toast('✓ Bonus approved', 'success');
            loadCommissionsTab();
          } catch (e) { toast(e.message, 'error'); b.disabled = false; }
        };
      });
      view.querySelectorAll('[data-cancel]').forEach(b => {
        b.onclick = async () => {
          if (!confirm('Cancel this proposed commission?')) return;
          haptic();
          b.disabled = true;
          try {
            await call('rpcCancelBonus', state.token, b.dataset.cancel, 'Cancelled from Commissions view');
            toast('Cancelled', 'warning');
            loadCommissionsTab();
          } catch (e) { toast(e.message, 'error'); b.disabled = false; }
        };
      });
    }
  }

  async function triggerCommissionRun(force) {
    const btn = $('runEngineBtn') || $('runEngineForceBtn');
    if (btn) btn.disabled = true;
    haptic();
    try {
      const result = (await call('rpcRunCommissionEngine', state.token, force === true)) || {};
      if (result.skipped) {
        const range = (result.weekStart && result.weekEnd)
          ? fmtDate(result.weekStart) + '–' + fmtDate(result.weekEnd) : 'that week';
        toast('Commissions for ' + range + ' were already computed. Tap "⟳ Force re-run" to recompute.', 'warning');
      } else {
        toast('✓ Created ' + (result.bonusesProposed ? result.bonusesProposed.length : 0) +
              ' commission(s), total ' + money(result.totalAmount || 0), 'success');
      }
      loadCommissionsTab();
    } catch (e) {
      toast(e.message, 'error');
      if (btn) btn.disabled = false;
    }
  }

  // ============================================================
  //  ░░  TAB: COMMISSION RULES  ░░
  // ============================================================
  //  Admin / payroll_admin manage the rules that drive the commission
  //  engine. Soft-delete via active=false (preserves audit trail).
  //  Some fields (company, appliesTo, staffId, effectiveFrom) are
  //  locked on edit because the engine treats them as identity —
  //  to change them, deactivate and create a new rule.
  // ============================================================
  async function loadRulesTab(force) {
    const view = $('view-rules');
    if (force || !cacheFresh('rpcGetCommissionRules', [state.token], TTL_REF)) {
      view.innerHTML = '<div class="loading"><div class="spinner"></div>Loading rules…</div>';
    }
    try {
      const rules = await cachedCall('rpcGetCommissionRules', [state.token], TTL_REF, { force });
      renderRulesTab(rules);
    } catch (e) {
      handleRpcError(e, view);
    }
  }

  function renderRulesTab(rules) {
    const view = $('view-rules');
    rules = rules || [];
    const canEdit = state.me.role === 'admin' || state.me.role === 'payroll_admin';
    if (state.rulesShowInactive === undefined) state.rulesShowInactive = false;

    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
      '<div style="font-size:13px;font-weight:700">Commission rules (' + visible.length + ')</div>' +

      visible.forEach(r => {

        html += '<div class="payroll-card">' +

              '<div class="payroll-name">' +
                '<span class="' + badgeClass + '">' + esc(r.company || '?') + '</span>' +
                esc(r.name || ('Rule ' + r.ruleId)) +
              '</div>' +
              '<div class="payroll-rate">Pay ' + esc(r.percentage) + '% over ' + money(r.threshold) + ' to ' + target + '</div>' +
            '</div>' +
            '<div style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;' +
              (r.active ? 'background:#dcfce7;color:#15803d' : 'background:#f0f1f5;color:#6a6e79') + '">' +
              (r.active ? 'ACTIVE' : 'INACTIVE') +
            '</div>' +
          '</div>' +
          '<div class="payroll-body">' +
            '<div class="payroll-body-row"><span class="payroll-body-row-label">Effective</span>' +
              '<span class="payroll-body-row-value">' +
                (r.effectiveFrom ? esc(fmtDate(r.effectiveFrom)) : '—') +
                ' → ' + (r.effectiveTo ? esc(fmtDate(r.effectiveTo)) : 'open') +
              '</span></div>' +
            (r.notes ? '<div class="payroll-body-row"><span class="payroll-body-row-label">Notes</span><span class="payroll-body-row-value">' + esc(r.notes) + '</span></div>' : '') +
          '</div>' +
          (canEdit
            ? '<div class="payroll-actions">' +
                '<button class="payroll-btn payroll-btn-secondary" data-edit-rule="' + esc(r.ruleId) + '">Edit</button>' +
                (r.active
                  ? '<button class="payroll-btn payroll-btn-secondary" data-deactivate-rule="' + esc(r.ruleId) + '" style="color:#b91c1c">Deactivate</button>'
                  : '<button class="payroll-btn payroll-btn-secondary" data-reactivate-rule="' + esc(r.ruleId) + '">Reactivate</button>') +
              '</div>'
            : '') +
        '</div>';
      });
    }

    view.innerHTML = html;

    $('showInactiveToggle').onchange = (e) => {
      state.rulesShowInactive = e.target.checked;
      renderRulesTab(rules);
    };

    if (canEdit) {
      const newBtn = $('newRuleBtn');
      if (newBtn) newBtn.onclick = () => { haptic(); openRuleForm(null); };
      view.querySelectorAll('[data-edit-rule]').forEach(b => {
        b.onclick = () => {
          haptic();

          openRuleForm(rule);
        };
      });
      view.querySelectorAll('[data-deactivate-rule]').forEach(b => {
        b.onclick = async () => {
          if (!confirm('Deactivate this rule? It stays in the system but is no longer used by the engine.')) return;
          haptic();
          b.disabled = true;

            await call('rpcUpdateCommissionRule', state.token, { ruleId: b.dataset.deactivateRule, active: false });
            toast('Rule deactivated', 'warning');
            loadRulesTab();
          } catch (e) { toast(e.message, 'error'); b.disabled = false; }

          b.disabled = true;

            toast('✓ Rule reactivated', 'success');

  async function openRuleForm(existingRule) {
    const isEdit = !!existingRule;
    openSheet({
      title: isEdit ? 'Edit rule' : 'New commission rule',
      subtitle: isEdit ? 'Some fields are locked on edit' : 'Defines when commissions are paid',
      bodyHTML: '<div class="loading"><div class="spinner"></div>Loading…</div>',
      actionsHTML: '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>',
    });

    // Need the staff directory for the "specific staff" picker
    let staffList = [];
    try { staffList = await cachedCall('rpcGetStaffDirectory', [state.token], TTL_REF); } catch (e) {}

    const r = existingRule || {};
    const today = isoDate(todayMidnight());
    const initial = {
      name:          r.name || '',
      company:       r.company || 'cstore',
      appliesTo:     r.appliesTo || 'all_staff',
      staffId:       r.staffId || '',
      threshold:     r.threshold != null ? String(r.threshold) : '',
      percentage:    r.percentage != null ? String(r.percentage) : '',
      effectiveFrom: r.effectiveFrom ? isoDate(new Date(r.effectiveFrom)) : today,
      effectiveTo:   r.effectiveTo ? isoDate(new Date(r.effectiveTo)) : '',
      notes:         r.notes || '',
    };
    const lockedNote = isEdit ? ' <em style="color:#8a8e98;font-size:10px">(locked)</em>' : '';
    const dis = isEdit ? ' disabled' : '';

    const staffOptions = staffList.map(s =>
      '<option value="' + esc(s.staffId) + '"' + (initial.staffId === s.staffId ? ' selected' : '') + '>' +
        esc(s.name) + (s.active ? '' : ' (inactive)') +
      '</option>'
    ).join('');

    const bodyHTML =
      '<div class="sheet-field"><label>Name (optional)</label>' +
        '<input type="text" id="ruleName" value="' + esc(initial.name) + '" placeholder="e.g. Cstore weekly commission"></div>' +

      '<div class="sheet-field"><label>Store' + lockedNote + '</label>' +
        '<select id="ruleCompany"' + dis + '>' +
          '<option value="cstore"' + (initial.company === 'cstore' ? ' selected' : '') + '>Cstore</option>' +
          '<option value="vape"' + (initial.company === 'vape' ? ' selected' : '') + '>Vape</option>' +
        '</select></div>' +

      '<div class="sheet-field"><label>Applies to' + lockedNote + '</label>' +
        '<select id="ruleAppliesTo"' + dis + '>' +
          '<option value="all_staff"' + (initial.appliesTo === 'all_staff' ? ' selected' : '') + '>All staff</option>' +
          '<option value="specific_staff"' + (initial.appliesTo === 'specific_staff' ? ' selected' : '') + '>Specific staff</option>' +
        '</select></div>' +

      '<div class="sheet-field" id="ruleStaffField" style="display:' + (initial.appliesTo === 'specific_staff' ? 'block' : 'none') + '">' +
        '<label>Staff member' + lockedNote + '</label>' +
        '<select id="ruleStaffId"' + dis + '>' + staffOptions + '</select></div>' +

      '<div class="sheet-field"><label>Sales threshold ($)</label>' +
        '<input type="number" step="0.01" id="ruleThreshold" inputmode="decimal" value="' + esc(initial.threshold) + '" placeholder="5000"></div>' +

      '<div class="sheet-field"><label>% Commission (on sales over threshold)</label>' +
        '<input type="number" step="0.01" id="rulePercentage" inputmode="decimal" value="' + esc(initial.percentage) + '" placeholder="3"></div>' +

      '<div class="sheet-field"><label>Effective from' + lockedNote + '</label>' +
        '<input type="date" id="ruleEffectiveFrom" value="' + esc(initial.effectiveFrom) + '"' + dis + '></div>' +

      '<div class="sheet-field"><label>Effective to (optional)</label>' +
        '<input type="date" id="ruleEffectiveTo" value="' + esc(initial.effectiveTo) + '"></div>' +

      '<div class="sheet-field"><label>Notes (optional)</label>' +
        '<input type="text" id="ruleNotes" value="' + esc(initial.notes) + '"></div>';

    const actionsHTML =
      '<button class="sheet-cancel" onclick="closeSheet()">Cancel</button>' +
      '<button class="sheet-submit" id="ruleSaveBtn">' + (isEdit ? 'Save changes' : 'Create rule') + '</button>';

    openSheet({
      title: isEdit ? 'Edit rule' : 'New commission rule',
      subtitle: isEdit ? 'Some fields are locked' : 'Defines when commissions are paid',
      bodyHTML,
      actionsHTML,
    });

    // Toggle staff dropdown when "applies to" changes
    $('ruleAppliesTo').onchange = () => {
      $('ruleStaffField').style.display = $('ruleAppliesTo').value === 'specific_staff' ? 'block' : 'none';
    };

    $('ruleSaveBtn').onclick = async () => {
      const company    = $('ruleCompany').value;
      const appliesTo  = $('ruleAppliesTo').value;
      const staffId    = appliesTo === 'specific_staff' ? $('ruleStaffId').value : '';
      const threshold  = parseFloat($('ruleThreshold').value);
      const percentage = parseFloat($('rulePercentage').value);
      const effFrom    = $('ruleEffectiveFrom').value;
      const effTo      = $('ruleEffectiveTo').value || null;
      const notes      = $('ruleNotes').value;
      const name       = $('ruleName').value || (company + ' ' + percentage + '% over $' + threshold);

      // Validation
      if (!company) return toast('Store required', 'error');
      if (appliesTo === 'specific_staff' && !staffId) return toast('Pick a staff member', 'error');
      if (!Number.isFinite(threshold) || threshold < 0) return toast('Valid threshold required', 'error');
      if (!Number.isFinite(percentage) || percentage <= 0) return toast('Valid percentage required', 'error');
      if (!isEdit && !effFrom) return toast('Effective from date required', 'error');

      haptic();
      const btn = $('ruleSaveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        if (isEdit) {
          await call('rpcUpdateCommissionRule', state.token, {
            ruleId: existingRule.ruleId,
            name, threshold, percentage,
            effectiveTo: effTo,
            notes,
          });
          toast('✓ Rule updated', 'success');
        } else {
          await call('rpcCreateCommissionRule', state.token, {
            name, company, appliesTo, staffId,
            threshold, percentage,
            effectiveFrom: effFrom,
            effectiveTo: effTo,
            notes,
          });
          toast('✓ Rule created', 'success');
        }
        closeSheet();
        loadRulesTab();
      } catch (e) {
        toast(e.message, 'error');
        btn.disabled = false;
        btn.textContent = isEdit ? 'Save changes' : 'Create rule';
      }
    };
  }

  async function loadSalesTab(force) {
    const f = state.salesFilters;
    if (!f.startDate) {
      const today = todayMidnight();
      f.startDate = isoDate(addDays(today, -6));
      f.endDate = isoDate(today);
    }
    const view = $('view-sales');
    if (!view.querySelector('#salesFilterCard')) {
      view.innerHTML = renderSalesScaffold();
      wireSalesFilters();
    }
    loadReconPanel(force);
    const args = [state.token, f];
    if (force || !cacheFresh('rpcGetSalesDashboard', args, TTL_SEMI)) {
      $('salesResults').innerHTML = '<div class="loading"><div class="spinner"></div>Loading sales…</div>';
    }
    try {
      const data = await cachedCall('rpcGetSalesDashboard', args, TTL_SEMI, { force });
      renderSalesResults(data);
    } catch (e) {
      handleRpcError(e, $('salesResults'));
    }

  // ── Daily reconciliation panel (cash variance + cards vs Clover) ──
  async function loadReconPanel(force) {
    const el = $('reconPanel');
    if (!el) return;
    try {
      const rows = await cachedCall('rpcGetReconciliation', [state.token], TTL_SEMI, { force });
      renderReconPanel(rows || []);
      // Self-heal: a close-time reconcile (fire-and-forget) can be lost if the
      // app is closed before it finishes. If nothing is reconciled for today
      // yet, retry once on dashboard open. Direct google.script.run so it does
      // NOT clear the client RPC cache (call() would, hurting perf); the server
      // call is idempotent and early-returns cheaply when nothing's pending.
      const todayStr = isoDate(todayMidnight());
      const hasToday = (rows || []).some(r => r.businessDate === todayStr);
      if (!hasToday && !state.reconHealing) {
        state.reconHealing = true;
        google.script.run
          .withSuccessHandler(r => { state.reconHealing = false; if (r && r.ready && !r.empty) loadReconPanel(true); })
          .withFailureHandler(() => { state.reconHealing = false; })
          .rpcReconcileDay(state.token, false);
      }
    } catch (e) {
      el.innerHTML = '';  // non-fatal: just hide the panel
    }
  }

  function renderReconPanel(rows) {
    const el = $('reconPanel');
    if (!el) return;
    rows = rows || [];
    const todayStr = isoDate(todayMidnight());
    const todayRows = rows.filter(r => r.businessDate === todayStr);
    const pastRows  = rows.filter(r => r.businessDate !== todayStr);

    let html = '<div class="recon-card">' +
      '<div class="recon-head">' +
        '<div class="recon-title">Daily reconciliation</div>' +
        '<button class="recon-btn" id="reconRunBtn">↻ Reconcile today</button>' +
      '</div>';

    // Today — detailed (credit/debit/total)
    if (!todayRows.length) {
      html += '<div class="recon-empty">Not reconciled yet today.</div>';
    } else {
      todayRows.forEach(r => { html += reconGroupDetail_(r); });
    }

    // History — per-shift, newest first
    if (pastRows.length) {
      html += '<div class="recon-hist-title">History</div>' +
        '<div class="recon-table">' +
        '<div class="recon-trow head"><div>When</div><div>Store</div>' +
          '<div class="r">Cash Δ</div><div class="r">Card</div><div class="r">Clover</div><div class="r">Status</div></div>';
      pastRows.forEach(r => {
        const cls = r.status === 'OK' ? 'ok' : (r.status === 'investigate' ? 'bad' : 'warn');
        html += '<div class="recon-trow">' +
          '<div>' + esc(r.businessDate) + '<br><small style="color:#9aa0ac">' + esc(fmtWin_(r.windowStart, r.windowEnd)) + '</small></div>' +
          '<div>' + esc(r.companies) + '</div>' +
          '<div class="r">' + signedMoney_(r.cashVariance) + '</div>' +
          '<div class="r">' + money(r.cashierCard) + '</div>' +
          '<div class="r">' + money(r.cloverCard) + '</div>' +
          '<div class="r"><span class="recon-badge ' + cls + '">' + esc(r.status) + '</span></div>' +
        '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
    el.innerHTML = html;
    $('reconRunBtn').onclick = async () => {
      haptic();
      const b = $('reconRunBtn'); b.disabled = true; b.textContent = 'Reconciling…';
      try {
        const res = (await call('rpcReconcileDay', state.token, true)) || {};
        if (res.empty) toast('Nothing to reconcile yet', 'warning');
        else toast((res.whatsapp && res.whatsapp.sent) ? '✓ Reconciled — WhatsApp sent' : '✓ Reconciled', 'success');
        loadReconPanel(true);
      } catch (e) { toast(e.message, 'error'); b.disabled = false; b.textContent = '↻ Reconcile today'; }
    };
  }

  function fmtWin_(startIso, endIso) {
    function t(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    return t(startIso) + '–' + t(endIso);
  }

  function reconGroupDetail_(r) {
    const cls = r.status === 'OK' ? 'ok' : (r.status === 'investigate' ? 'bad' : 'warn');
    let h = '<div class="recon-group">' +
      '<div class="recon-group-head"><span>' + esc(r.companies) +
        ' <small style="color:#9aa0ac;font-weight:600">' + esc(fmtWin_(r.windowStart, r.windowEnd)) + '</small></span>' +
        '<span class="recon-badge ' + cls + '">' + esc(r.status) + '</span></div>' +
      '<div class="recon-line"><span>Cash counted</span><span>' + money(r.cashCounted) +
        ' <small>(var ' + signedMoney_(r.cashVariance) + ')</small></span></div>';
    if (r.status === 'clover_unavailable') {
      h += '<div class="recon-line"><span>Card (cashier)</span><span>' + money(r.cashierCard) +
        ' <small>Clover unavailable</small></span></div>';
    } else {
      h += reconRow_('Credit', r.cashierCredit, r.cloverCredit) +
           reconRow_('Debit',  r.cashierDebit,  r.cloverDebit) +
           reconRow_('Total',  r.cashierCard,   r.cloverCard);
    }
    h += '</div>';
    return h;
  }

  function reconRow_(label, cashier, clover) {
    const diff = Math.round((cashier - clover) * 100) / 100;
    const ok = Math.abs(diff) < 0.005;
    return '<div class="recon-line"><span>' + label + '</span>' +
      '<span>' + money(cashier) + ' vs ' + money(clover) +
      ' <small class="' + (ok ? 'recon-ok' : 'recon-diff') + '">(' + signedMoney_(diff) + ')</small></span></div>';
  }

  function signedMoney_(n) {
    n = Number(n) || 0;
    return (n < 0 ? '-' : '+') + '$' + Math.abs(n).toFixed(2);
  }

  async function wireSalesFilters() {
    // Populate staff dropdown — uses rpcGetStaffDirectory which is open
    // to any authenticated user (admin + manager + employee). Cached as
    // reference data so repeated filter applies don't re-fetch it.
    try {
      const staff = await cachedCall('rpcGetStaffDirectory', [state.token], TTL_REF);
      const sel = $('fStaff');
      staff.forEach(s => {
        const o = document.createElement('option');
        o.value = s.staffId;
        o.textContent = s.active ? s.name : s.name + ' (inactive)';
        sel.appendChild(o);
      });
      sel.value = state.salesFilters.staffId || '';
    } catch (e) { /* leave "All staff" if lookup fails */ }
    $('fCompany').value = state.salesFilters.company || '';

    $('applyFilters').onclick = () => {
      state.salesFilters.startDate = $('fStart').value;
      state.salesFilters.endDate = $('fEnd').value;
      state.salesFilters.staffId = $('fStaff').value;
      state.salesFilters.company = $('fCompany').value;
      state.salesFilters.page = 1;
      loadSalesTab();
    };
  }

      '<div class="sales-total-card"><div class="sales-total-label">Misc</div><div class="sales-total-amount">' + money(t.misc) + '</div></div>' +

    (data.rows || []).forEach(r => {
      const miscTitle = r.miscNotes ? ' title="' + esc(r.miscNotes) + '"' : '';

        '<div>' + esc(r.dateStr || r.date || '—') + '</div>' +

        '<div class="right">' + money(r.credit) + '</div>' +
        '<div class="right">' + money(r.debit) + '</div>' +

  function renderHistoryTab(items) {
    const view = $('view-history');
    if (!items || items.length === 0) {
      view.innerHTML = moreBack() + '<div class="empty"><div class="empty-icon">📋</div>No payments yet</div>';
      return;
    }
    let html = moreBack();
    items.forEach((p, i) => {
      const itemLines = (p.items || []).map(it =>
        '<div>' + esc(it.itemType) + ' · ' + esc(it.refId) + ' · ' + money(it.amount) +
        (it.notes ? ' <em style="color:#8a8e98">(' + esc(it.notes) + ')</em>' : '') + '</div>'
      ).join('');
      html += '<div class="history-item">' +
        '<div class="history-head">' +
          '<div>' +
            '<div class="history-name">' + esc(p.staffName) + '</div>' +
            '<div class="history-meta">' + esc(fmtDate(p.paidOn)) + ' · ' + esc(p.method || 'cash') + ' · ' + (p.items ? p.items.length : 0) + ' item' + ((p.items && p.items.length === 1) ? '' : 's') + '</div>' +
          '</div>' +
          '<div class="history-amount">' + money(p.totalAmount) + '</div>' +
        '</div>' +
        (itemLines ? '<button class="history-toggle" data-toggle="' + i + '">Show items</button>' : '') +
        '<div class="history-items" id="histItems-' + i + '">' + itemLines + '</div>' +
        (state.me.role === 'admin' || state.me.role === 'payroll_admin'
          ? '<button class="history-toggle" data-undo="' + esc(p.paymentId) + '" style="color:#b91c1c">Undo this payment</button>'
          : '') +
      '</div>';
    });
    view.innerHTML = html;
    view.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.onclick = () => {
        const el = $('histItems-' + btn.dataset.toggle);
        el.classList.toggle('show');
        btn.textContent = el.classList.contains('show') ? 'Hide items' : 'Show items';
      };
    });
    view.querySelectorAll('[data-undo]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Undo this payment? This cannot be redone automatically.')) return;
        haptic();
        btn.disabled = true;
        try {
          await call('rpcUndoPayment', state.token, btn.dataset.undo);
          toast('Payment undone', 'warning');
          loadHistoryTab();
        } catch (e) { toast(e.message, 'error'); btn.disabled = false; }
      };
    });
  }

  // ============================================================
  //  BOOT
  // ============================================================
  (async function boot() {
    // Restore session if present
    const savedToken = sessionStorage.getItem('storeops_token');
    const savedMe = sessionStorage.getItem('storeops_me');
    if (savedToken && savedMe) {
      state.token = savedToken;
      try {
        state.me = JSON.parse(savedMe);
        // One round-trip: validate token + fetch the landing shift state.
        const boot = await call('rpcGetBootstrap', savedToken);
        state.me = boot.me;
        // Pre-seed the shift cache so the landing tab renders instantly
        // (no second round-trip on boot).
        if (boot.shift) {
          rpcCache.set(_ckey('rpcGetMyShiftState', [savedToken]), { ts: Date.now(), data: boot.shift });
        }
        enterApp();
        return;
      } catch (e) {
        sessionStorage.removeItem('storeops_token');
        sessionStorage.removeItem('storeops_me');
      }
    }
    loadLoginScreen();
  })();
</script>
</body>
</html>
